name: Daily paper brief

on:
  schedule:
    # 08:00 Asia/Shanghai = 00:00 UTC. Runs every day.
    - cron: "0 0 * * *"
  workflow_dispatch: {}  # manual trigger from the Actions tab

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  brief:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Fetch & annotate
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
        run: python scripts/fetch_papers.py --config config.yaml --data-dir src/data/posts

      - name: Commit new brief
        run: |
          git config user.name  "paper-brief-bot"
          git config user.email "actions@users.noreply.github.com"
          git add src/data/posts/
          if git diff --cached --quiet; then
            echo "No new content; nothing to commit."
          else
            git commit -m "brief: $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install JS deps
        run: npm ci || npm install

      - name: Build site
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: brief
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
