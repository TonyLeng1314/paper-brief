site_name: 论文速递
site_description: 每日个性化 arxiv 论文筛选与推送。
site_url: https://TonyLeng1314.github.io/paper-brief/

theme:
  name: material
  custom_dir: overrides
  language: zh
  palette:
    - scheme: slate
      primary: deep purple
      accent: purple
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.indexes
    - content.code.copy
    - search.suggest
    - search.highlight
  font: false  # disable Google Fonts; use system 仿宋 cascade from CSS

extra_css:
  - stylesheets/01-tokens.css
  - stylesheets/02-base.css
  - stylesheets/03-effects.css
  - stylesheets/04-components.css

extra_javascript:
  - javascripts/extra.js

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - tables
  - toc:
      permalink: true

nav:
  - 首页: index.md

plugins:
  - search
