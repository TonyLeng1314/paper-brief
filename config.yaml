# Paper Brief — personalized daily paper discovery config.
# Edit this freely; the GitHub Action picks it up on next cron.

# ---- Sources ----
sources:
  arxiv:
    enabled: true
    categories: [cs.RO, cs.CV, cs.LG, cs.AI]
    max_per_category: 60
  huggingface_papers:
    enabled: true
  semantic_scholar_authors:
    enabled: true
    lookback_days: 7

# ---- Relevance ----
keywords:
  high_priority:
    # VLA 直接相关 —— 这是你研究的主战场
    - VLA
    - vision language action
    - robot manipulation policy
    - latent action
    # JEPA / world model / SSL 表示学习
    - JEPA
    - joint embedding predictive
    - world model
    - latent world
    - predictor design
    - representation collapse
    - non-contrastive
    - self-supervised representation
    - SIGReg
    - VICReg
  medium_priority:
    - flow matching policy
    - spatial reasoning
    - RoboTwin
    - LIBERO
    - layer selection
    - DINOv2
    - V-JEPA
  cross_domain:
    - predictive coding
    - active inference
    - audio self-supervised
    - BEATs
    - w2v-BERT

authors:
  - Mahmoud Assran
  - Adrien Bardes
  - Mathilde Caron
  - Sergey Levine
  - Chelsea Finn
  - Yuandong Tian
  - Yann LeCun
  - Pieter Abbeel

# ---- Filtering ----
filter:
  # "strict" = high precision, fewer papers. "loose" = more recall.
  mode: loose
  # How many top-prescored candidates we let the LLM look at per day.
  # DeepSeek is cheap (~¥0.1-0.3/day at this size), so we go wide.
  llm_cap: 100
  # Min relevance score (0-10) to include after LLM annotation.
  min_score: 3
  max_papers_per_day: 30

# ---- LLM annotation ----
# Uses an OpenAI-compatible endpoint. Provide OPENAI_API_KEY and (optionally)
# OPENAI_BASE_URL as env / GitHub secrets. Defaults to DeepSeek official API.
llm:
  enabled: true
  model: deepseek-v4-pro
  # Papers per LLM request. Bigger = fewer system-prompt repeats (DeepSeek
  # caches the system prefix anyway, but fewer round-trips still wins).
  # Keep ≤15 so a single bad parse doesn't lose too many papers.
  batch_size: 10
  # Where the user's research context lives (long-form, cached every day).
  research_profile_path: research_profile.md
