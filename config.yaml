# Paper Brief — personalized daily paper discovery config.
# Edit this freely; the GitHub Action picks it up on next cron.

# ---- Sources ----
sources:
  arxiv:
    enabled: true
    categories: [cs.RO, cs.CV, cs.LG, cs.AI]
    max_per_category: 60
  huggingface_papers:
    enabled: true
  semantic_scholar_authors:
    enabled: true
    lookback_days: 7

# ---- Relevance ----
keywords:
  high_priority:
    - JEPA
    - joint embedding predictive
    - world model
    - latent world
    - predictor design
    - representation collapse
    - non-contrastive
    - self-supervised representation
    - SIGReg
    - VICReg
  medium_priority:
    - VLA
    - vision language action
    - robot manipulation policy
    - latent action
    - flow matching policy
    - spatial reasoning
    - RoboTwin
    - LIBERO
    - layer selection
    - DINOv2
    - V-JEPA
  cross_domain:
    - predictive coding
    - active inference
    - audio self-supervised
    - BEATs
    - w2v-BERT

authors:
  - Mahmoud Assran
  - Adrien Bardes
  - Mathilde Caron
  - Sergey Levine
  - Chelsea Finn
  - Yuandong Tian
  - Yann LeCun
  - Pieter Abbeel

# ---- Filtering ----
filter:
  # "strict" = high precision, fewer papers. "loose" = more recall.
  mode: strict
  # Min relevance score (0-10) to include after LLM annotation.
  min_score: 5
  max_papers_per_day: 10

# ---- LLM annotation ----
llm:
  enabled: true
  model: claude-sonnet-4-6
  # Where the user's research context lives (long-form, cached every day).
  research_profile_path: research_profile.md
